<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" role="img" aria-label="赫眉 HYMN">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap');</style>
  </defs>
  <!-- 直角细边框（含赫眉），四周留白避免裁切 -->
  <rect x="14" y="40" width="312" height="120" rx="2" fill="none" stroke="#221D17" stroke-width="3"/>
  <!-- 赫眉（黑体几何粗笔画） -->
  <text x="170" y="135" text-anchor="middle"
        font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif"
        font-weight="900" font-size="98" letter-spacing="2" fill="#221D17">赫眉</text>
  <!-- HYMN（几何粗体，宽字距） -->
  <text x="362" y="130"
        font-family="'Arial Black','Helvetica Neue','DM Sans',sans-serif"
        font-weight="900" font-size="80" letter-spacing="6" fill="#221D17">HYMN</text>
</svg>
